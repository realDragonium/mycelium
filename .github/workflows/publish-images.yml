name: Publish images

# Builds the server + ollama images and publishes them to GHCR, tagged with
# the git tag version (v1.2.3 -> 1.2.3) and the commit SHA. Consumers (e.g. a
# private deployment repo) pin a version and copy the image into their own
# registry — this workflow never deploys anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: mycelium-server
            dockerfile: docker/Dockerfile
          - image: mycelium-ollama
            dockerfile: docker/Dockerfile.ollama
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Fargate runs amd64; the server Dockerfile also hardcodes the
          # linux-amd64 Litestream package.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
