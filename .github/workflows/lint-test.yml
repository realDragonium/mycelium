name: Lint & test

# Keeps the shape from rotting: ruff (format + lint) and the test suite run
# on every push/PR. Style conventions live in docs/STYLE.md and pyproject.toml.
on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      # phrasing validation loads this spaCy model at runtime (see SETUP.md)
      - run: uv run python -m spacy download en_core_web_sm
      # The --deselect list below is the set of KNOWN pre-existing failures
      # (annotations JSON round-trip + mention-cascade bugs) that predate CI.
      # Remove entries as they get fixed. Do NOT add to this list to get a
      # red build green — fix the test or revert the change.
      - run: >
          uv run pytest -q
          --deselect tests/test_annotations.py::test_annotation_attached_to_both_statement_and_entity
          --deselect tests/test_annotations.py::test_annotation_attached_to_entity
          --deselect tests/test_annotations.py::test_annotation_attached_to_statement
          --deselect tests/test_annotations.py::test_annotation_multi_attach_to_statements
          --deselect tests/test_annotations.py::test_attach_detach_are_idempotent
          --deselect tests/test_annotations.py::test_attach_requires_exactly_one_target
          --deselect tests/test_annotations.py::test_delete_annotation_clears_joins
          --deselect tests/test_annotations.py::test_get_entity_includes_mentioning_annotations
          --deselect tests/test_annotations.py::test_list_annotation_kinds_enumerates_in_use
          --deselect tests/test_annotations.py::test_list_annotations_filters_compose
          --deselect tests/test_annotations.py::test_mentions_auto_create_entity
          --deselect tests/test_annotations.py::test_merge_entities_moves_annotation_attachments
          --deselect tests/test_annotations.py::test_merge_statements_moves_annotation_attachments
          --deselect tests/test_annotations.py::test_near_duplicates_warning
          --deselect tests/test_annotations.py::test_starting_vocabulary_round_trips
          --deselect tests/test_annotations.py::test_statement_deletion_leaves_orphan_annotation
          --deselect tests/test_annotations.py::test_upsert_with_id_reconciles_attachment_set
          --deselect tests/test_http.py::test_delete_entity_cascades_names_mentions_and_links
          --deselect tests/test_http.py::test_delete_name_drops_alias_and_its_mentions
          --deselect tests/test_http.py::test_delete_statement_cascades_mentions_and_links
          --deselect tests/test_http.py::test_merge_entities_preserves_statement_mentions
